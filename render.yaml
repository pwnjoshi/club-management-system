services:
  - type: web
    name: collegeclub-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw -DskipTests package
    startCommand: java -jar target/collegeclub-0.0.1-SNAPSHOT.jar
    envVars:
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: http://localhost:3000,https://*.vercel.app